name: ingest

on:
  schedule:
    - cron: '0 */3 * * *'  # ogni 3 ore
  workflow_dispatch:        # trigger manuale
    inputs:
      analysis_days:
        description: 'Days back for post-session analysis (default 2)'
        required: false
        default: '2'

permissions:
  actions: write
  contents: read

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GARMIN_SESSION_JSON: ${{ secrets.GARMIN_SESSION_JSON }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      HEALTHCHECKS_PING_URL_GARMIN_SYNC: ${{ secrets.HC_GARMIN }}
      HEALTHCHECKS_PING_URL_STRAVA_SYNC: ${{ secrets.HC_STRAVA }}
      INGEST_DAYS_BACK: '7'
      PYTHONPATH: '.'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Garmin sync (with retries)
        id: garmin
        run: |
          # Bug fix audit L1: senza questo, l'ultima cmd del loop su fallimento
          # era `sleep` (exit 0) → lo step risultava VERDE anche dopo 3 fallimenti,
          # mascherando uno stop sync e facendo girare i downstream su dati stantii.
          ok=0
          for i in 1 2 3; do
            echo "Garmin attempt $i"
            if python -m coach.ingest.garmin; then ok=1; break; fi
            sleep $((i * 30))
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Garmin sync fallito dopo 3 tentativi"
            exit 1
          fi

      #- name: Strava sync
       # if: always()
        #run: python -m coach.ingest.strava

      - name: Compute daily metrics
        run: python -m coach.analytics.daily

      - name: Post-session analysis
        if: success()
        run: python -m coach.coaching.post_session_analysis --recent --days ${{ github.event.inputs.analysis_days || '2' }}

      - name: Detect and process fitness tests
        if: success()
        run: python -m coach.coaching.fitness_test_processor --check-recent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Pre-test prediction (Phase 2.6)
        # 24-48h prima del test pianificato, registra una prediction nel DB
        # (calibrazione modello via outcome_verification).
        if: success()
        continue-on-error: true
        run: python -m coach.coaching.test_prediction
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Apply accepted modulations (audit K1)
        # Il bot Telegram setta status='accepted' al tap; qui le applichiamo
        # davvero al piano (apply_accepted_modulations → status 'applied').
        # D-06: nessun if: su questo step → defaults a success(). Il step gira solo
        # se il Garmin sync ha avuto successo (exit 0), mai su dati stantii.
        continue-on-error: true
        run: python -m coach.coaching.modulation --apply-accepted

      - name: ETL health check
        if: always()
        run: python scripts/etl_health_check.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Trigger morning brief (solo run mattutino 05-07 UTC)
        if: success()
        continue-on-error: true
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge "5" ] && [ "$HOUR" -le "7" ]; then
            echo "Morning ingest: triggering briefing"
            gh workflow run morning-briefing.yml --ref "$GITHUB_REF_NAME"
          else
            echo "Not morning run (hour=$HOUR), skipping brief trigger"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
