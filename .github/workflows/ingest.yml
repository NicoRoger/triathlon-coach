name: ingest

on:
  schedule:
    - cron: '0 */3 * * *'  # ogni 3 ore
  workflow_dispatch:        # trigger manuale
    inputs:
      analysis_days:
        description: 'Days back for post-session analysis (default 2)'
        required: false
        default: '2'

permissions:
  actions: write
  # C2: il fitness_test_processor aggiorna CLAUDE.md sul runner; serve write
  # per committare l'aggiornamento (altrimenti le soglie annunciate su Telegram
  # non finiscono mai nel repo).
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GARMIN_SESSION_JSON: ${{ secrets.GARMIN_SESSION_JSON }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      HEALTHCHECKS_PING_URL_GARMIN_SYNC: ${{ secrets.HC_GARMIN }}
      HEALTHCHECKS_PING_URL_STRAVA_SYNC: ${{ secrets.HC_STRAVA }}
      INGEST_DAYS_BACK: '7'
      PYTHONPATH: '.'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # C1: a livello job così TUTTI gli step (inclusa la post-session analysis,
      # che invia analisi e proposte di modulazione) possono notificare Telegram.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Garmin sync (with retries)
        id: garmin
        run: |
          # Bug fix audit L1: senza questo, l'ultima cmd del loop su fallimento
          # era `sleep` (exit 0) → lo step risultava VERDE anche dopo 3 fallimenti,
          # mascherando uno stop sync e facendo girare i downstream su dati stantii.
          ok=0
          for i in 1 2 3; do
            echo "Garmin attempt $i"
            if python -m coach.ingest.garmin; then ok=1; break; fi
            sleep $((i * 30))
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Garmin sync fallito dopo 3 tentativi"
            exit 1
          fi

      #- name: Strava sync
       # if: always()
        #run: python -m coach.ingest.strava

      - name: Compute daily metrics
        run: python -m coach.analytics.daily

      - name: Post-session analysis
        if: success()
        run: python -m coach.coaching.post_session_analysis --recent --days ${{ github.event.inputs.analysis_days || '2' }}

      - name: Detect and process fitness tests
        if: success()
        continue-on-error: true
        run: python -m coach.coaching.fitness_test_processor --check-recent

      - name: Commit anamnesi se rigenerata dal fitness test processor (WP1)
        # Il processore rigenera docs/athlete_anamnesis.md (vista dal DB) —
        # CLAUDE.md non viene più patchato dai job.
        if: always()
        continue-on-error: true
        run: |
          if git diff --quiet docs/athlete_anamnesis.md 2>/dev/null && \
             git ls-files --error-unmatch docs/athlete_anamnesis.md >/dev/null 2>&1; then
            echo "Anamnesi invariata, niente da committare"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/athlete_anamnesis.md
            git diff --cached --quiet && { echo "Nulla in staging"; exit 0; }
            git commit -m "chore: rigenera anamnesi atleta da fitness test [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME" || true
            git push
          fi

      - name: Pre-test prediction (Phase 2.6)
        # 24-48h prima del test pianificato, registra una prediction nel DB
        # (calibrazione modello via outcome_verification).
        if: success()
        continue-on-error: true
        run: python -m coach.coaching.test_prediction

      - name: Apply accepted modulations (audit K1)
        # Il bot Telegram setta status='accepted' al tap; qui le applichiamo
        # davvero al piano (apply_accepted_modulations → status 'applied').
        # D-06: nessun if: su questo step → defaults a success(). Il step gira solo
        # se il Garmin sync ha avuto successo (exit 0), mai su dati stantii.
        continue-on-error: true
        run: python -m coach.coaching.modulation --apply-accepted

      - name: ETL health check
        if: always()
        run: python scripts/etl_health_check.py

      - name: Trigger morning brief (ingest mattutino 03-09 UTC)
        if: success()
        continue-on-error: true
        # L'ingest (ogni 3h) è puntuale, gli scheduled cron di GitHub ritardano
        # 4-6h: triggeriamo il brief dall'ingest. Il floor gate (Rome>=5) e
        # l'idempotency once-per-day in briefing.py garantiscono UN solo invio,
        # al primo ingest dopo le 05:00 Rome. Finestra larga 03-09 UTC per
        # catturare il run mattutino nonostante il jitter dello scheduler.
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge "3" ] && [ "$HOUR" -le "9" ]; then
            echo "Morning ingest: triggering briefing"
            gh workflow run morning-briefing.yml --ref "$GITHUB_REF_NAME"
          else
            echo "Not morning run (hour=$HOUR), skipping brief trigger"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger energy update (ingest tardo 05-13 UTC)
        if: success()
        continue-on-error: true
        # Stesso meccanismo del trigger brief, spostato ~2h dopo: Body Battery
        # e readiness Garmin ("energia al risveglio") devono arrivare DOPO il
        # risveglio naturale, non alle 5 — altrimenti la notifica del brief
        # interrompe il sonno e falsa proprio i dati che il messaggio riporta.
        # Floor gate (Rome>=7) + idempotency once-per-day in briefing.py
        # garantiscono un solo invio, al primo ingest dopo le 07:00 Rome.
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge "5" ] && [ "$HOUR" -le "13" ]; then
            echo "Late morning ingest: triggering energy update"
            gh workflow run energy-update.yml --ref "$GITHUB_REF_NAME"
          else
            echo "Not late-morning run (hour=$HOUR), skipping energy trigger"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
