name: proactive-reminders

# Fase 1.6 — Proactive Telegram nudges
# Runs every 30 minutes to check trigger conditions and send nudges
# to the athlete via Telegram when actions in Claude.ai are needed.
# Deduplication via sent_reminders table (unique on trigger_type + sent_date).

on:
  schedule:
    # Ogni 30 min (offset 7 per evitare picco condivisione runner)
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      ignore_time_window:
        description: "Bypass time-of-day checks (test all triggers)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Dry-run: log what would be sent without sending"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      skip_dedup:
        description: "Ignore sent_reminders dedup (force re-send)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run proactive reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IGNORE_TIME_WINDOW: ${{ github.event.inputs.ignore_time_window || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SKIP_DEDUP: ${{ github.event.inputs.skip_dedup || 'false' }}
        run: python -m coach.coaching.proactive_reminders
