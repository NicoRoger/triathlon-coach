name: weekly-review

on:
  schedule:
    # Audit L5: doppio cron + gate --rome-hour 19 → domenica 19:00 Rome tutto l'anno.
    - cron: '0 17 * * 0'  # estate: 19:00 Rome
    - cron: '0 18 * * 0'  # inverno: 19:00 Rome
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PYTHONPATH: '.'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Send weekly review reminder
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/send_notification.py weekly-review
          else
            python scripts/send_notification.py weekly-review --rome-hour 19
          fi