name: rotate-worker-secrets

# WP4 — Genera e imposta i secret fail-closed dei worker SENZA una macchina
# locale con wrangler autenticato:
#   - OAUTH_CONNECT_SECRET   → worker mcp-server
#   - TELEGRAM_WEBHOOK_SECRET → worker telegram-bot + setWebhook su Telegram
#
# Il connect secret viene inviato all'atleta via Telegram (canale privato già
# fidato per brief e infortuni): serve solo per autorizzare NUOVE connessioni
# MCP da Claude.ai — quella esistente usa il bearer già emesso e non si tocca.
#
# ⚠️ Rilanciarlo RUOTA entrambi i secret (è la procedura di rotazione
# documentata in docs/SECRETS.md). Il webhook viene ri-registrato in
# automatico; l'unico effetto per l'atleta è un nuovo connect secret in chat.
#
# I valori non compaiono mai nei log (::add-mask:: prima di ogni uso).

on:
  workflow_dispatch:

concurrency:
  group: rotate-worker-secrets
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genera secret (mascherati nei log)
        id: gen
        run: |
          OAUTH_SECRET=$(openssl rand -hex 24)
          WEBHOOK_SECRET=$(openssl rand -hex 24)
          echo "::add-mask::$OAUTH_SECRET"
          echo "::add-mask::$WEBHOOK_SECRET"
          echo "oauth=$OAUTH_SECRET" >> "$GITHUB_OUTPUT"
          echo "webhook=$WEBHOOK_SECRET" >> "$GITHUB_OUTPUT"

      - name: Imposta OAUTH_CONNECT_SECRET su mcp-server
        working-directory: workers/mcp-server
        run: |
          npm ci --silent
          printf '%s' "${{ steps.gen.outputs.oauth }}" | npx wrangler secret put OAUTH_CONNECT_SECRET

      - name: Imposta TELEGRAM_WEBHOOK_SECRET su telegram-bot
        working-directory: workers/telegram-bot
        run: |
          npm ci --silent
          printf '%s' "${{ steps.gen.outputs.webhook }}" | npx wrangler secret put TELEGRAM_WEBHOOK_SECRET

      - name: Ri-registra webhook Telegram con secret_token
        # L'URL corrente arriva da getWebhookInfo: nessun hardcode dell'URL worker.
        run: |
          set -euo pipefail
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          URL=$(curl -sS "https://api.telegram.org/bot${BOT}/getWebhookInfo" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['url'])")
          if [ -z "$URL" ]; then
            echo "Nessun webhook registrato: impossibile ricavare l'URL del worker" >&2
            exit 1
          fi
          RES=$(curl -sS "https://api.telegram.org/bot${BOT}/setWebhook" \
            --data-urlencode "url=${URL}" \
            --data-urlencode "secret_token=${{ steps.gen.outputs.webhook }}")
          echo "$RES" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok'), d; print('setWebhook OK')"

      - name: Invia il connect secret all'atleta via Telegram
        run: |
          MSG=$(printf '🔐 <b>Nuovo OAUTH_CONNECT_SECRET</b> (worker MCP)\n\n<code>%s</code>\n\nSalvalo: serve SOLO se ri-autorizzi la connessione MCP da Claude.ai. La connessione attuale continua a funzionare.' "${{ steps.gen.outputs.oauth }}")
          curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${MSG}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok'), d; print('sendMessage OK')"
