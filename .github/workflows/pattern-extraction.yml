name: pattern-extraction

on:
  schedule:
    # Domenica notte alle 23:00 (Europe/Rome = 21:00 UTC in estate)
    - cron: '0 21 * * 0'
  workflow_dispatch:

concurrency:
  group: pattern-extraction
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TRIGGER }} # Needed to commit back to repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Extract Patterns
        run: python -m coach.coaching.pattern_extraction

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/coaching_observations.md
          git commit -m "docs: auto-update coaching observations" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Push failed or not needed"
