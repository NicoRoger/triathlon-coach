name: pattern-extraction

on:
  schedule:
    # Domenica notte alle 23:00 (Europe/Rome = 21:00 UTC in estate)
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pattern-extraction
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Adaptive planner (compliance check)
        run: python -m coach.coaching.adaptive_planner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Verify outcomes (Phase 2.1)
        # Confronta predictions con realtà, popola outcomes table,
        # aggiorna docs/athlete_beliefs.md con bias longitudinali.
        run: python -m coach.coaching.outcome_verification

      - name: Schedule fitness tests (Phase 2.6)
        # Se ultimo test > 42gg (bike/run) o > 56gg (swim) e non race week,
        # pianifica nuovo test in planned_sessions per la prossima settimana.
        run: python -m coach.coaching.test_scheduler

      - name: Extract Patterns
        run: python -m coach.coaching.pattern_extraction

      - name: Sync beliefs from observations (Phase 4.4)
        # Estrae belief candidates dal pattern_extraction output e le scrive in
        # `beliefs` table con guardrails automatici.
        run: python -m coach.coaching.extract_beliefs_from_observations

      - name: Decay old beliefs (Phase 4.4)
        # Applica evidence decay esponenziale alle beliefs non reinforced
        run: python -c "from coach.analytics.belief_engine import decay_old_beliefs; print(decay_old_beliefs())"

      - name: Update CLAUDE.md status
        run: python scripts/update_claude_md_status.py

      - name: Update progress tracker
        run: python scripts/update_progress_tracker.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/coaching_observations.md docs/progress_tracker.md docs/athlete_beliefs.md CLAUDE.md
          git commit -m "docs: auto-update coaching observations + progress tracker + athlete beliefs" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Push failed or not needed"
