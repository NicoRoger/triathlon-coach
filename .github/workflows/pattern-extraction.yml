name: pattern-extraction

on:
  schedule:
    # Domenica notte alle 23:00 (Europe/Rome = 21:00 UTC in estate)
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pattern-extraction
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Adaptive planner (compliance check)
        run: python -m coach.coaching.adaptive_planner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Extract Patterns
        run: python -m coach.coaching.pattern_extraction

      - name: Update CLAUDE.md status
        run: python scripts/update_claude_md_status.py

      - name: Update progress tracker
        run: python scripts/update_progress_tracker.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/coaching_observations.md docs/progress_tracker.md CLAUDE.md
          git commit -m "docs: auto-update coaching observations + progress tracker" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Push failed or not needed"
