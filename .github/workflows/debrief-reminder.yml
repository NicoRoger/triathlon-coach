name: debrief-reminder

on:
  schedule:
    # Reliability: i cron di GitHub Actions ritardano (1-3h) e talvolta vengono
    # droppati. Scheduliamo PIÙ tentativi serali; il gate catch-up in
    # send_notification.py (--rome-hour 21) invia al primo run che cade dopo le
    # 21:00 Europe/Rome e l'idempotency blocca i doppioni. Copre estate (UTC+2)
    # e inverno (UTC+1) senza logica DST: il gate filtra per ora Rome.
    - cron: '0 19 * * *'   # 21:00 Rome (estate) / 20:00 (inverno, skip→catch-up dopo)
    - cron: '30 19 * * *'  # 21:30 Rome (estate)
    - cron: '0 20 * * *'   # 22:00 Rome (estate) / 21:00 (inverno)
    - cron: '30 20 * * *'  # 22:30 Rome (estate) / 21:30 (inverno)
    - cron: '0 21 * * *'   # 23:00 Rome (estate) / 22:00 (inverno) — fallback tardo
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PYTHONPATH: '.'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Send reminder
        # workflow_dispatch (manuale) bypassa il gate; i cron lo applicano.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/send_notification.py debrief-reminder
          else
            python scripts/send_notification.py debrief-reminder --rome-hour 21
          fi
