name: debrief-reminder

on:
  schedule:
    # Audit L5: doppio cron (estate UTC+2 / inverno UTC+1). Il gate --rome-hour 21
    # fa inviare SOLO il run che cade alle 21:xx Europe/Rome → 21:30 tutto l'anno.
    - cron: '30 19 * * *'  # estate: 21:30 Rome
    - cron: '30 20 * * *'  # inverno: 21:30 Rome
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PYTHONPATH: '.'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Send reminder
        # workflow_dispatch (manuale) bypassa il gate; i cron lo applicano.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/send_notification.py debrief-reminder
          else
            python scripts/send_notification.py debrief-reminder --rome-hour 21
          fi
