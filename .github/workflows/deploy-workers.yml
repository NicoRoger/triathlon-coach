name: deploy-workers

# Deploy dei Cloudflare Workers (MCP server + Telegram bot) da CI, così i
# rilasci non dipendono più da una macchina locale con wrangler autenticato.
#
# Trigger:
#   - workflow_dispatch: rilascio manuale (anche da Claude.ai/GitHub UI), con
#     scelta del target.
#   - push su main che tocca il codice dei worker: rilascio automatico.
#
# Secret richiesti (Settings → Secrets and variables → Actions):
#   - CF_WORKERS_API_TOKEN  token Cloudflare con permesso "Edit Cloudflare Workers"
#                           (in fallback usa CF_PAGES_API_TOKEN se ha lo scope Workers)
#   - CF_ACCOUNT_ID         account id Cloudflare (già usato da deploy-dashboard.yml)
#
# NB: i secret runtime dei worker (SUPABASE_*, MCP_BEARER_TOKEN, TELEGRAM_*, ecc.)
# vivono su Cloudflare via `wrangler secret put` e NON sono toccati dal deploy.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Quale worker deployare'
        type: choice
        required: true
        default: both
        options:
          - both
          - mcp-server
          - telegram-bot
  push:
    branches: [main]
    paths:
      - 'workers/mcp-server/**'
      - 'workers/telegram-bot/**'
      - '.github/workflows/deploy-workers.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        worker: [mcp-server, telegram-bot]
    steps:
      - name: Skip se non selezionato (solo per dispatch manuale)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ github.event.inputs.target }}" != "both" ] \
             && [ "${{ github.event.inputs.target }}" != "${{ matrix.worker }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skip ${{ matrix.worker }} (target=${{ github.event.inputs.target }})"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci
        working-directory: workers/${{ matrix.worker }}

      - name: Type check
        if: steps.gate.outputs.run == 'true'
        run: npx tsc --noEmit
        working-directory: workers/${{ matrix.worker }}

      - name: Deploy ${{ matrix.worker }}
        if: steps.gate.outputs.run == 'true'
        run: npx wrangler deploy
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_API_TOKEN || secrets.CF_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
