name: morning-briefing

on:
  schedule:
    # Target: brief alle 05:00 Europe/Rome. 5am Rome = 03:00 UTC (estate, UTC+2)
    # / 04:00 UTC (inverno, UTC+1). Il floor gate in briefing.py (skip se ora
    # Rome < 5) impedisce l'invio anticipato del cron 03:00 d'inverno; il primo
    # run utile invia e l'idempotency 6h blocca i doppioni. '20 6' resta come
    # safety net tardo (ingest mattutino lento/fallito).
    - cron: '0 3 * * *'    # 05:00 Rome (estate) / 04:00 (inverno → gate skip)
    - cron: '30 3 * * *'   # 05:30 Rome (estate) catch-up se 03:00 droppato
    - cron: '0 4 * * *'    # 05:00 Rome (inverno) / 06:00 (estate → idempotency)
    - cron: '20 6 * * *'   # safety net tardo
  workflow_dispatch:
    inputs:
      force_send:
        description: "Bypass idempotency check (force re-send)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Previene duplicate se sia il trigger da ingest che il fallback schedule partono
concurrency:
  group: morning-briefing
  cancel-in-progress: true

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HEALTHCHECKS_PING_URL_BRIEFING_MORNING: ${{ secrets.HC_BRIEFING }}
      PYTHONPATH: '.'
      SHOULDER_ACTIVE: ${{ secrets.SHOULDER_ACTIVE }}
      PLANTAR_ACTIVE: ${{ secrets.PLANTAR_ACTIVE }}
      FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m coach.planning.briefing
