name: morning-briefing

on:
  schedule:
    # Fallback: si attiva solo se l'ingest mattutino non l'ha già triggerato.
    # L'ingest gira alle 06:00 UTC e chiama `gh workflow run` dopo il successo;
    # questo schedule a 06:20 è il safety net per ingest lento o fallito.
    - cron: '20 6 * * *'
  workflow_dispatch:

# Previene duplicate se sia il trigger da ingest che il fallback schedule partono
concurrency:
  group: morning-briefing
  cancel-in-progress: true

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HEALTHCHECKS_PING_URL_BRIEFING_MORNING: ${{ secrets.HC_BRIEFING }}
      PYTHONPATH: '.'
      SHOULDER_ACTIVE: ${{ secrets.SHOULDER_ACTIVE }}
      PLANTAR_ACTIVE: ${{ secrets.PLANTAR_ACTIVE }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m coach.planning.briefing
