name: proactive-check-in

on:
  schedule:
    # Audit L5: doppio cron (estate UTC+2 / inverno UTC+1) + gate Rome-hour=18
    # nello step → 18:00 Europe/Rome tutto l'anno (Mar/Gio/Sab).
    - cron: '0 16 * * 2,4,6'  # estate: 18:00 Rome
    - cron: '0 17 * * 2,4,6'  # inverno: 18:00 Rome
  workflow_dispatch:

concurrency:
  group: proactive-check-in
  cancel-in-progress: true

jobs:
  check_in:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Proactive Questions Check-In
        # Gate DST: invia solo nel run che cade alle 18:xx Europe/Rome
        # (workflow_dispatch manuale bypassa il gate).
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HOUR=$(TZ='Europe/Rome' date +%H)
            if [ "$HOUR" != "18" ]; then
              echo "DST gate: ora Rome $HOUR != 18, skip"
              exit 0
            fi
          fi
          python -m coach.coaching.proactive_questions
